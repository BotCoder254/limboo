# Limboo — canonical pipeline specification
#
# This file is the SINGLE SOURCE OF TRUTH for the logical CI/CD pipeline. It is
# provider-agnostic by design: GitLab CI (.gitlab-ci.yml) and GitHub Actions
# (.github/workflows) both implement the `validate -> build -> test` (ci) layer
# identically, in this exact order, via the same ci/scripts/*.mjs, so any provider
# can be adopted for ordinary commit validation.
#
# The `package`/`secure`/`release` (cd + release) layers are wired up in GitLab, the
# PRIMARY release publisher and the single source of truth for this repo: its
# `release` stage triggers on every v* tag, packages all 3 OSes (Linux shared runner
# / Windows + macOS SaaS runners) and publishes the SAME build to BOTH a GitLab
# Release (CI_JOB_TOKEN) and a GitHub Release (gh CLI + GH_TOKEN from a
# masked+protected CI/CD variable — see docs/ci/gitlab-ci.md). The GitHub repo is
# kept in sync by GitLab push mirroring. GitHub Actions keeps an equivalent, manually
# dispatched fallback (release.yml + _package.yml — the only path that mints
# build-provenance/SBOM attestations; GitLab generates its SBOM via
# @cyclonedx/cyclonedx-npm instead). When you change the pipeline, change THIS file
# first, then update the GitLab implementation (and any other provider you've wired
# up release credentials for) to match.
#
# It is documentation, not an executable config — no provider reads it directly.
# The reusable logic lives in ci/scripts/*.mjs so every provider runs byte-for-byte
# identical behavior rather than re-implementing steps in YAML.

meta:
  project: limboo
  package_manager: npm            # package-lock.json is authoritative
  node_version: "22"              # Electron 42 requires Node >= 22.12 (ERR_REQUIRE_ESM otherwise)
  native_modules: [better-sqlite3]  # needs a C/C++ toolchain + python3; node-pty (Node-API 1.2.0-beta line) ships an ABI-stable prebuilt and is excluded from rebuild (forge.config.ts)
  platforms: [linux, macos, windows]
  installers:                     # produced by electron-builder (electron-builder.yml)
    windows: nsis                 # branded multi-page wizard + auto-update
    macos: [dmg, zip]             # zip required for electron-updater
    linux: [AppImage, deb, rpm]   # AppImage required for electron-updater

# Layered responsibilities. Each layer has ONE job; failures isolate to their
# lifecycle instead of interrupting unrelated work.
layers:
  ci:       Validate every push and pull request. Never produces shippable artifacts.
  cd:       Package, sign, SBOM, checksum platform binaries. Never publishes.
  release:  Tag-triggered. Collect CD artifacts, generate notes, publish releases.

# Canonical stage order. "fail fast": cheap validation gates the expensive build.
stages:
  - id: validate
    layer: ci
    fail_fast: true
    steps:
      - Install dependencies from the lockfile (npm ci).
      - Lint sources (npm run lint  ->  eslint .ts/.tsx).
      - Lint workflow + config YAML and Markdown docs.
      - Secret scanning (gitleaks).
      - Dependency vulnerability audit (npm audit / dependency review).
      - License compliance (ci/scripts/check-licenses.mjs).
      - Static analysis / SAST (CodeQL — see .github/workflows/codeql.yml).
      - Electron security invariants (ci/scripts/check-electron-security.mjs):
          contextIsolation on, nodeIntegration off, sandbox on, CSP present.
      - Manifest + docs integrity (ci/scripts/check-manifest.mjs).

  - id: build
    layer: ci
    needs: [validate]
    steps:
      - Build the renderer (vite build --config vite.renderer.config.mts).
      - Build main + preload (electron-forge package compiles them via the Vite plugin).
      # NOTE: do NOT use `tsc --noEmit` — TS is ~4.5 and the renderer is esbuild-bundled.

  - id: test
    layer: ci
    needs: [build]
    matrix: [linux, macos, windows]
    steps:
      - Unit tests (when present).
      - Integration tests (when present).
      - Electron smoke launch (ci/scripts/smoke-test.mjs under xvfb on Linux):
          app boots, main process initializes, window is created, no crash.

  - id: package
    layer: cd
    needs: [test]
    matrix: [linux, macos, windows]
    when: tag OR manual dispatch
    steps:
      - npm run dist  ->  electron-forge package (Vite + fuses + asar) then
        electron-builder --prepackaged -> branded per-OS installers (NSIS on
        windows, dmg/zip on macOS, AppImage/deb/rpm on linux) + latest*.yml
        auto-update metadata.
      - Collect artifacts under dist.

  - id: secure
    layer: cd
    needs: [package]
    steps:
      - Generate an SBOM (CycloneDX / anchore sbom-action) for the build.
      - Compute SHA-256 checksums (ci/scripts/make-checksums.mjs  ->  SHA256SUMS).
      - Verify code signing where signing credentials are configured
        (ci/scripts/verify-signing.mjs); skip cleanly when unsigned.
      - Generate build-provenance + SBOM attestations (GitHub artifact attestations
        on the Actions fallback; GitLab documents the equivalent / cosign path).

  - id: release
    layer: release
    needs: [secure]
    when: tag matching v*
    steps:
      - Generate categorized release notes (ci/scripts/generate-release-notes.mjs)
        from conventional commits + merged-PR labels between the previous tag and HEAD.
      - Publish a GitLab Release (assets via the Generic Package Registry) AND an
        identical GitHub Release with installers + SHA256SUMS + auto-update metadata.

# Security is a first-class, every-commit concern — never a post-release afterthought.
security_invariants:
  - "Least-privilege tokens; default `permissions: contents: read`, widen per-job only."
  - Prefer the built-in GITHUB_TOKEN + OIDC over long-lived credentials.
  - Secrets live ONLY in the provider's secret store (GitLab masked+protected vars —
    primary; GH secrets for the Actions fallback) — never in the repo or in YAML.
  - Pin third-party actions to a commit SHA where practical.
  - Provenance/SBOM attestation on every release; start in audit mode, then enforce.
  - Any git automation uses `--force-with-lease`, never a bare `--force`.
