name: Release (manual fallback)

# Manual FALLBACK release publisher. CircleCI (.circleci/config.yml, `release`
# workflow) is the primary publisher and runs automatically on every `v*` tag —
# this workflow deliberately has NO tag trigger so the two can never both publish
# the same release. Dispatch it only when CircleCI is unavailable: it reuses the
# CD packaging workflow (with attestations enabled), generates categorized release
# notes, and publishes a GitHub Release with installers + SHA256SUMS + SBOM.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to build and publish (e.g. v1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  package:
    name: Package + attest
    uses: ./.github/workflows/_package.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      ref: ${{ inputs.tag }}
      attest: true

  publish:
    name: Publish GitHub Release
    needs: [package]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0   # full history so release notes can diff from the prev tag

      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Consolidate checksums
        # Each OS produced its own SHA256SUMS; combine into one top-level manifest.
        run: node ci/scripts/make-checksums.mjs dist SHA256SUMS

      - name: Generate release notes
        run: node ci/scripts/generate-release-notes.mjs "${{ inputs.tag }}" RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Limboo ${{ inputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(inputs.tag, '-') }}
          # The *.yml + *.blockmap files are electron-builder's auto-update metadata
          # — electron-updater reads latest.yml / latest-mac.yml / latest-linux.yml
          # from the Release to detect and verify new versions. They MUST be attached.
          files: |
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.zip
            dist/**/*.yml
            dist/**/*.blockmap
            dist/**/*.cdx.json
            SHA256SUMS
