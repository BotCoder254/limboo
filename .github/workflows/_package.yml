name: Package (reusable)

# Reusable CD build: packages platform installers, generates an SBOM + checksums,
# verifies signing where configured, and emits build-provenance + SBOM
# attestations. Called by cd.yml (manual dry-run) and release.yml (tags). Keeping
# the build in ONE reusable workflow is what lets every caller produce identical
# artifacts and moves toward SLSA Build L3 (isolated, vetted build instructions).

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to build (empty = the caller's own ref)
        type: string
        required: false
        default: ""
      attest:
        description: Generate provenance/SBOM attestations
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
      id-token: write        # OIDC for attestations
      attestations: write     # write artifact attestations
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        # rpm/dpkg + native module toolchain; electron-builder builds deb/rpm/AppImage.
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 rpm fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Apply version from tag
        # Tag-driven versioning: stamp package.json with the tag version before
        # building so the installers + latest*.yml match the Release. `inputs.ref` is
        # the tag on the release.yml path; a non-tag ref (cd.yml dry-run) is a no-op.
        run: node ci/scripts/apply-tag-version.mjs "${{ inputs.ref }}"

      - name: Build branded installers (Forge package + electron-builder)
        # Forge packages the app (Vite build + security fuses + asar layout); then
        # electron-builder wraps that prepackaged dir into the branded NSIS / dmg /
        # AppImage targets and emits the latest*.yml auto-update metadata. `--publish
        # never` keeps this reusable build side-effect-free; release.yml publishes.
        run: npm run dist -- --publish never

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/limboo-sbom.cdx.json

      - name: Compute checksums
        run: node ci/scripts/make-checksums.mjs dist dist/SHA256SUMS

      - name: Verify code signing (skips when unsigned)
        run: node ci/scripts/verify-signing.mjs dist

      - name: Attest build provenance
        if: ${{ inputs.attest }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.zip

      - name: Attest SBOM
        if: ${{ inputs.attest }}
        uses: actions/attest-sbom@v1
        with:
          subject-path: dist/SHA256SUMS
          sbom-path: dist/limboo-sbom.cdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: limboo-${{ runner.os }}
          # Includes the installers AND the latest*.yml update metadata + .blockmap
          # files electron-updater needs — they must reach the GitHub Release.
          path: dist/**/*
          if-no-files-found: error
          retention-days: 14
