name: CI

# Continuous Integration — validates every push and pull request and never
# produces shippable artifacts. Layered, fail-fast stages mirror ci/pipeline.yml:
#   validate  ->  build  ->  test (cross-platform).
# TypeScript is ~4.5 and the renderer is esbuild-bundled, so `tsc --noEmit` is
# intentionally NOT used (CLAUDE.md §2/§9). All reusable logic lives in
# ci/scripts/*.mjs so GitLab CI and CircleCI run identical behavior.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - name: Install dependencies
        run: npm ci
      - name: Lint sources
        run: npm run lint
      - name: License compliance
        run: node ci/scripts/check-licenses.mjs
      - name: Electron security invariants
        run: node ci/scripts/check-electron-security.mjs
      - name: Manifest + docs integrity
        run: node ci/scripts/check-manifest.mjs
      - name: Dependency audit (high+)
        run: npm audit --audit-level=high || echo "::warning::npm audit reported advisories"

  build:
    name: Build
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - name: Install dependencies
        run: npm ci
      - name: Build renderer
        run: npx vite build --config vite.renderer.config.mts
      - name: Package (compiles main + preload)
        run: npm run package

  test:
    name: Test (${{ matrix.os }})
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install native build deps (Linux)
        if: runner.os == 'Linux'
        # Electron needs the full GTK/ATK/CUPS/ALSA stack to launch (the smoke test
        # boots a real Electron process), not just nss/gbm — otherwise it fails with
        # "libatk-1.0.so.0: cannot open shared object file". The GTK/ATK/CUPS/ALSA
        # package names changed under Ubuntu 24.04's t64 transition, so try the
        # standard names first and fall back to the t64 variants.
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 xvfb \
            libnss3 libdrm2 libgbm1 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libpango-1.0-0 libcairo2
          sudo apt-get install -y libatk1.0-0 libatk-bridge2.0-0 libcups2 libgtk-3-0 libasound2 \
            || sudo apt-get install -y libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libgtk-3-0t64 libasound2t64
      - name: Install dependencies
        run: npm ci
      - name: Electron smoke test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a node ci/scripts/smoke-test.mjs
      - name: Electron smoke test (macOS / Windows)
        if: runner.os != 'Linux'
        run: node ci/scripts/smoke-test.mjs
