name: Security

# Supply-chain security as a first-class, every-commit concern (not a post-release
# step): secret scanning, dependency review/audit, and an SBOM artifact. SAST lives
# in codeql.yml. Mirrors the `validate`/`secure` stages of ci/pipeline.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"   # weekly Monday scan

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  audit:
    name: npm audit + license gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: npm ci
      - name: Audit (high+)
        run: npm audit --audit-level=high || echo "::warning::npm audit reported advisories"
      - name: License compliance
        run: node ci/scripts/check-licenses.mjs

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: npm ci
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: limboo-sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: limboo-sbom.cdx.json
          retention-days: 30
