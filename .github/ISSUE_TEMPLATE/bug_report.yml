name: Bug report
description: Report a problem so it can be reproduced and fixed.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search existing issues
        first. Do not use this form for security vulnerabilities — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps that trigger the bug.
      placeholder: |
        1. Open a workspace at ...
        2. Start a session and ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Limboo version
      description: The app version (from package.json or the About info).
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: >-
        Relevant main-process logs (see docs/operations/debugging.md). Redact any
        secrets before pasting.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am on the latest version.
          required: true
