version: 2.1

# Limboo — CircleCI
#
# CI-only: validate -> build -> test, on every push, the same logical stages as
# ci/pipeline.yml's `ci` layer, via the same ci/scripts/*.mjs. CircleCI does not
# package, sign, or publish releases in this repo — GitHub Actions' release.yml is
# the sole release publisher (it builds all 3 OSes and needs zero manual token
# setup via the workflow's built-in GITHUB_TOKEN). See docs/ci/circleci.md and
# docs/ci/release-process.md.

executors:
  node-linux:
    docker:
      # Electron 42 requires Node >= 22.12 (see package.json `engines`). Running an
      # older Node here makes `electron`'s install.js fail with ERR_REQUIRE_ESM when
      # it require()s the now-ESM `@electron/get` -> `got` chain.
      - image: cimg/node:22.12
    resource_class: medium

commands:
  install_native_deps:
    description: System toolchain for native modules (better-sqlite3, node-pty)
    steps:
      - run:
          name: Install build dependencies
          command: sudo apt-get update && sudo apt-get install -y build-essential python3
  npm_ci:
    steps:
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
      - run: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths: [~/.npm]

jobs:
  validate:
    executor: node-linux
    steps:
      - checkout
      - install_native_deps
      - npm_ci
      - run: npm run lint
      - run: node ci/scripts/check-licenses.mjs
      - run: node ci/scripts/check-electron-security.mjs
      - run: node ci/scripts/check-manifest.mjs
      - run:
          name: Dependency audit (high+, non-blocking)
          command: npm audit --audit-level=high || echo "audit advisories reported"

  build:
    executor: node-linux
    steps:
      - checkout
      - install_native_deps
      - npm_ci
      - run: npx vite build --config vite.renderer.config.mts
      - run: npm run package

  test:
    executor: node-linux
    steps:
      - checkout
      - run:
          name: Install test runtime deps
          # Electron needs the full GTK/ATK/CUPS/ALSA stack to launch (the smoke test
          # boots a real Electron process), not just nss/gbm — otherwise it fails with
          # "libatk-1.0.so.0: cannot open shared object file". Names differ across the
          # Ubuntu 24.04 t64 transition, so fall back to the t64 variants if needed.
          command: |
            sudo apt-get update
            sudo apt-get install -y build-essential python3 xvfb \
              libnss3 libdrm2 libgbm1 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libpango-1.0-0 libcairo2
            sudo apt-get install -y libatk1.0-0 libatk-bridge2.0-0 libcups2 libgtk-3-0 libasound2 \
              || sudo apt-get install -y libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libgtk-3-0t64 libasound2t64
      - npm_ci
      - run: xvfb-run -a node ci/scripts/smoke-test.mjs

workflows:
  ci:
    jobs:
      - validate
      - build:
          requires: [validate]
      - test:
          requires: [build]
