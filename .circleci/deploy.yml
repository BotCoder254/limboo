version: 2.1

# Limboo — CircleCI
#
# Implements the SAME logical pipeline as .github/workflows and .gitlab-ci.yml
# (see ci/pipeline.yml): validate -> build -> test -> package -> secure -> release,
# in the same order, via the same ci/scripts/*.mjs. Reusable jobs + workflows keep
# every provider in lockstep.
#
# Secrets MUST live in CircleCI Contexts or Project Environment Variables (never in
# this file): a fine-grained GitHub PAT / GitHub App for releases, and any signing
# certificates. See docs/ci/circleci.md.

executors:
  node-linux:
    docker:
      # Electron 42 requires Node >= 22.12 (see package.json `engines`). Running an
      # older Node here makes `electron`'s install.js fail with ERR_REQUIRE_ESM when
      # it require()s the now-ESM `@electron/get` -> `got` chain.
      - image: cimg/node:22.12
    resource_class: medium

commands:
  install_native_deps:
    description: System toolchain for native modules (better-sqlite3, node-pty)
    steps:
      - run:
          name: Install build dependencies
          command: sudo apt-get update && sudo apt-get install -y build-essential python3
  npm_ci:
    steps:
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
      - run: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths: [~/.npm]

jobs:
  validate:
    executor: node-linux
    steps:
      - checkout
      - install_native_deps
      - npm_ci
      - run: npm run lint
      - run: node ci/scripts/check-licenses.mjs
      - run: node ci/scripts/check-electron-security.mjs
      - run: node ci/scripts/check-manifest.mjs
      - run:
          name: Dependency audit (high+, non-blocking)
          command: npm audit --audit-level=high || echo "audit advisories reported"

  build:
    executor: node-linux
    steps:
      - checkout
      - install_native_deps
      - npm_ci
      - run: npx vite build --config vite.renderer.config.mts
      - run: npm run package

  test:
    executor: node-linux
    steps:
      - checkout
      - run:
          name: Install test runtime deps
          # Electron needs the full GTK/ATK/CUPS/ALSA stack to launch (the smoke test
          # boots a real Electron process), not just nss/gbm — otherwise it fails with
          # "libatk-1.0.so.0: cannot open shared object file". Names differ across the
          # Ubuntu 24.04 t64 transition, so fall back to the t64 variants if needed.
          command: |
            sudo apt-get update
            sudo apt-get install -y build-essential python3 xvfb \
              libnss3 libdrm2 libgbm1 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libpango-1.0-0 libcairo2
            sudo apt-get install -y libatk1.0-0 libatk-bridge2.0-0 libcups2 libgtk-3-0 libasound2 \
              || sudo apt-get install -y libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libgtk-3-0t64 libasound2t64
      - npm_ci
      - run: xvfb-run -a node ci/scripts/smoke-test.mjs

  package:
    executor: node-linux
    steps:
      - checkout
      - run:
          name: Install packaging deps
          command: sudo apt-get update && sudo apt-get install -y build-essential python3 rpm fakeroot dpkg
      - npm_ci
      # Forge packages the app (Vite + fuses + asar); electron-builder then wraps it
      # into branded installers + latest*.yml auto-update metadata. `--publish never`
      # keeps build side-effect-free — the release job publishes. (Linux artifacts
      # here; the GitHub Actions matrix produces the full Win/mac/Linux set.)
      - run: npm run dist -- --publish never
      - run: node ci/scripts/make-checksums.mjs dist dist/SHA256SUMS
      - run: node ci/scripts/verify-signing.mjs dist
      - store_artifacts:
          path: dist
          destination: installers
      - persist_to_workspace:
          root: .
          paths: [dist]

  release:
    executor: node-linux
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Generate release notes
          command: node ci/scripts/generate-release-notes.mjs "$CIRCLE_TAG" RELEASE_NOTES.md
      # Deploy markers: log this release in the CircleCI Deploys UI and let it drive
      # the rollback/deploy pipelines. Auto-generated markers were sunset (2025-06),
      # so they are created explicitly here. The deploy name ties plan -> status.
      - run:
          name: Plan deploy marker
          command: |
            circleci run release plan "limboo-$CIRCLE_TAG" \
              --environment-name="production" \
              --component-name="limboo-desktop" \
              --target-version="$CIRCLE_TAG" \
              --namespace="default"
            circleci run release update "limboo-$CIRCLE_TAG" --status=running
      - run:
          name: Publish GitHub Release
          # GITHUB_TOKEN / GH_TOKEN is supplied by the `limboo-release` Context.
          command: |
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list
            sudo apt-get update && sudo apt-get install -y gh
            gh release create "$CIRCLE_TAG" \
              --title "Limboo $CIRCLE_TAG" \
              --notes-file RELEASE_NOTES.md \
              $(find dist -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.yml' -o -name '*.blockmap' \))
      - run:
          name: Mark deploy succeeded
          command: circleci run release update "limboo-$CIRCLE_TAG" --status=SUCCESS
      - run:
          name: Mark deploy failed
          when: on_fail
          command: circleci run release update "limboo-$CIRCLE_TAG" --status=FAILED --failure-reason="release job failed"

workflows:
  ci:
    jobs:
      - validate
      - build:
          requires: [validate]
      - test:
          requires: [build]

  release:
    jobs:
      - validate:
          filters: &tag-only
            tags: { only: /^v.*/ }
            branches: { ignore: /.*/ }
      - build:
          requires: [validate]
          filters: *tag-only
      - test:
          requires: [build]
          filters: *tag-only
      - package:
          requires: [test]
          filters: *tag-only
      - release:
          requires: [package]
          context: limboo-release   # holds GITHUB_TOKEN + signing secrets
          filters: *tag-only
