<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <!--
      Defense-in-depth CSP fallback. The authoritative policy is the response
      header set in src/main/index.ts (strict in production). This meta must stay
      permissive enough for the Vite dev server (inline styles/scripts + ws HMR).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; connect-src 'self' ws: http: https:; img-src 'self' data: blob:; object-src 'none'; frame-src 'none';"
    />
    <title>Limboo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
